<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - Manyundo Wholesalers</title>
  <link rel="stylesheet" href="css/common.css">
</head>
<body class="signup-page">
  <div class="signup-card">
    <h2>Create Account</h2>
    <form id="signupForm">
      <input type="text" id="username" placeholder="Username (min 3)" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password (min 6)" required>
      <input type="tel" id="phone" placeholder="Phone number (for M-Pesa)" required>
      <button type="submit" style="width:100%">Sign Up</button>
    </form>
    <div class="switch">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>
  <script src="js/common.js"></script>
</body>
</html>
