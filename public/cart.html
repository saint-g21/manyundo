<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart - Manyundo Wholesalers</title>
  <link rel="stylesheet" href="css/common.css">
</head>
<body class="cart-page">
  <header style="background: rgba(51,51,51,0.85); color:#fff; text-align:center; padding:15px;">
    <h1>Manyundo Wholesalers</h1>
    <p>Your trusted source for quality tools</p>
  </header>
  <nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="orders.html">Orders</a>
    <a href="support.html">support</a>
    <a href="account.html">My Account</a>
    <a href="#" id="logoutBtn">Logout</a>
  </nav>
  <div class="cart-wrapper">
    <h1>Your Shopping Cart</h1>
    <table class="cart-table">
      <thead><tr><th>Product</th><th>Price</th><th>Quantity</th><th>Subtotal</th><th>Action</th></tr></thead>
      <tbody id="cartItems"></tbody>
    </table>
    <p class="total" id="cartTotal">Total: $0.00</p>
    <button onclick="proceedCheckout()">Proceed to Checkout</button>
  </div>
  <script src="js/common.js"></script>
</body>
</html>
