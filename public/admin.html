<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - Manyundo Wholesalers</title>
  <link rel="stylesheet" href="css/common.css">
</head>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-KTLQLS3B6V"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-KTLQLS3B6V');

<body class="admin-page">
  <header><h1>Admin Dashboard</h1></header>
  <nav><a href="home.html">Home</a> <a href="dashboard.html">Dashboard</a> <a href="#" id="logoutBtn">Logout</a></nav>
  <div class="admin-container">
    <div class="tabs">
      <button class="tab-btn active" data-tab="users">Users</button>
      <button class="tab-btn" data-tab="orders">Orders</button>
      <button class="tab-btn" data-tab="products">Products</button>
    </div>
    <div id="users" class="tab-content active">
      <h2>Manage Users</h2>
      <table id="usersTable"><thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Phone</th><th>Role</th><th>Created</th><th>Actions</th></tr></thead><tbody></tbody></table>
    </div>
    <div id="orders" class="tab-content">
      <h2>All Orders</h2>
      <table id="ordersTable"><thead><tr><th>Order ID</th><th>User</th><th>Total</th><th>Status</th><th>Date</th><th>Receipt</th><th>Actions</th></tr></thead><tbody></tbody></table>
    </div>
    <div id="products" class="tab-content">
      <h2>All Products</h2>
      <button id="addProductBtn" class="add-btn">+ Add Product</button>
      <table id="productsTable"><thead><tr><th>ID</th><th>Name</th><th>Price</th><th>Stock</th><th>Description</th><th>Actions</th></tr></thead><tbody></tbody></table>
    </div>
  </div>
  <div id="roleModal" class="modal"><div class="modal-content"><h3>Change User Role</h3><select id="roleSelect"><option value="customer">Customer</option><option value="vendor">Vendor</option><option value="admin">Admin</option></select><button id="saveRoleBtn">Save</button><button id="closeRoleModal">Cancel</button></div></div>
  <div id="orderModal" class="modal"><div class="modal-content"><h3>Change Order Status</h3><select id="orderStatusSelect"><option value="pending">Pending</option><option value="paid">Paid</option><option value="shipped">Shipped</option><option value="delivered">Delivered</option><option value="cancelled">Cancelled</option></select><button id="saveOrderStatusBtn">Save</button><button id="closeOrderModal">Cancel</button></div></div>
  <script src="js/common.js"></script>
</body>
</html>
